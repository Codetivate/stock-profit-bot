<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Earnings Exclusive logo - clean megaphone variant</title>
<desc>Featured logo with megaphone announcement icon and prominent EARNINGS EXCLUSIVE wordmark, no taglines or badges.</desc>

<g transform="translate(100, 20)">
  <rect width="480" height="480" rx="16" fill="#ffffff" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>

  <!-- Megaphone -->
  <g transform="translate(200, 150) rotate(-10)">
    <rect x="-70" y="-15" width="22" height="30" fill="#002e60" stroke="#000000" stroke-width="3" rx="2"/>
    <path d="M -48 -34 L -48 34 L 52 52 L 52 -52 Z" fill="#f58f2a" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
    <ellipse cx="52" cy="0" rx="9" ry="52" fill="#473f72" stroke="#000000" stroke-width="3"/>
    <rect x="-48" y="-34" width="100" height="10" fill="#21ce99" stroke="#000000" stroke-width="2.5"/>
  </g>

  <!-- Broadcast bars (chart coming out of megaphone) -->
  <g transform="translate(285, 85)">
    <rect x="0"  y="46" width="15" height="46" fill="#002e60" stroke="#000000" stroke-width="2.5"/>
    <rect x="23" y="22" width="15" height="70" fill="#002e60" stroke="#000000" stroke-width="2.5"/>
    <rect x="46" y="0"  width="15" height="92" fill="#21ce99" stroke="#000000" stroke-width="2.5"/>
  </g>

  <!-- Big wordmark -->
  <text x="240" y="325" font-family="Inter, system-ui, sans-serif" font-size="54" font-weight="700" fill="#002e60" text-anchor="middle" letter-spacing="4">EARNINGS</text>
  <text x="240" y="385" font-family="Inter, system-ui, sans-serif" font-size="54" font-weight="700" fill="#f58f2a" text-anchor="middle" letter-spacing="4">EXCLUSIVE</text>
</g>
</svg>
