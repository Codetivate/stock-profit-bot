name: Broadcast new earnings

# DEPRECATED: functionally replaced by .github/workflows/monitor.yml,
# which uses the Playwright pipeline to bypass Incapsula and detect new
# filings reliably. This workflow remains as a manual-dispatch escape
# hatch only — cron scheduling has been removed.

on:
  workflow_dispatch:

concurrency:
  group: broadcast
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run broadcast scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python broadcast.py

      - name: Commit data changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update earnings data [skip ci]"
            git push
          else
            echo "No data changes to commit"
          fi
